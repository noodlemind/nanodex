[pytest]
# pytest configuration for nanodex

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests

# Logging
log_cli = false
log_cli_level = INFO

# Coverage (if using pytest-cov)
# Uncomment when pytest-cov is installed
# addopts = --cov=nanodex --cov-report=term-missing

# Ignore paths
norecursedirs = .git .tox dist build *.egg
